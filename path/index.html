<html>

<script src="d3.min.js"> </script>
<script src="plotly/plotly.min.js"> </script>
<script src="spline.js"> </script>
<script src="splineTest.js"> </script>
<script> 

function curve3() {
      //3D curve fit test with splihes

      var data = genHelix() ;
      console.log(data);
      var update = { opacity: 0.4, 'marker.color': 'green' };
      var aplot = document.getElementById("plotter");
      var layout = {
           scene: {
                aspectmode: "manual",
                aspectratio: {x:1, y:0.7, z:1}
           }
      }; // end layout
      var trend1 = { type:'scatter3d',
                     mode:"markers",
                     x: data.x, y: data.y , z: data.z,
                     marker: {symbol: 'circle' } 
                   };

         

      var trend2 = { type:'scatter3d',
                     mode:"lines",
                     x: data.x, y: data.y , z: data.z,
                     line: {width: 6, color: "rgb(220,100,0)"},
                   };

      Plotly.newPlot(aplot, [trend1, trend2], layout ) ;
} // curve3d 

</script>

<body>
<h1> Testing Cubic Spline Interpolation </h1>
<div id="plotter" style="width:1200px; height:800px;">
<button onClick="curve3(); fplot('mydata');">Plot</button>

</div>

</body>
