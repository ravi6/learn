<script type=module >
 /* Setup camera, scene, and render objects */
  import * as THREE from 'three' ;
  import WebGL from 'three/addons/capabilities/WebGL.js';
  if ( ! WebGL.isWebGLAvailable() ) { alert("No WebGL support") }; 
  import {GUI} from 'three/addons/libs/lil-gui.module.min.js';

  const loader = new THREE.TextureLoader();
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
                75, window.innerWidth / window.innerHeight,
                0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
 
  // Setup display on the web page
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement); 

  // Scene Creation and Manipulation 
  const geom = new THREE.BoxGeometry(3,3,3);
	
  const mat1 = new THREE.MeshPhongMaterial({  
       map: loader.load("textures/tex1.jpg"),
       color: 'rgb(200,00,0)',
       shininess: 150,
       }); 
  const mat2 = new THREE.MeshPhongMaterial({  
       map: loader.load("textures/tex1.jpg"),
       color: 'rgb(100,200,100)',
       shininess: 150,
       }); 
  const mat = [mat1, mat1, mat1, mat1, mat2, mat1] ; 
  const cube = new THREE.Mesh(geom, mat);
  
  camera.position.set(0,0,6);
  scene.add(cube);
	
  const light = new THREE.AmbientLight(0xd8f808); 
  scene.add(light); 

	
  const dlight = new THREE.DirectionalLight(0xd8f808,1);
	// dlight.position.set(0, 10, 0);
	// dlight.target.position.set(-5, 0, 0);
	scene.add(dlight);
	//scene.add(light.target);
	
  animate();
	
class hexColor {
  constructor(obj) {
    this.obj = obj;
  }
  get value() {
    return `#${this.obj['color'].getHexString()}`;
  }
  set value(hexS) {
    this.obj['color'].set(hexS);
  }
}
