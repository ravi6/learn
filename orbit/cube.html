<html>
<head>
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
      {
	"imports": {
	  "three": 
	      "https://unpkg.com/three@v0.154.0/build/three.module.js",
	  "three/addons/":
	      "https://unpkg.com/three@v0.154.0/examples/jsm/"
	}
      }
	
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js" integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS" crossorigin="anonymous"></script>
</head>

<script type=module >

 /* Setup camera, scene, and render objects */
  import * as THREE from 'three' ;
  import WebGL from 'three/addons/capabilities/WebGL.js';
  if ( ! WebGL.isWebGLAvailable() ) { alert("No WebGL support") }; 

  const loader = new THREE.TextureLoader();
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
                75, window.innerWidth / window.innerHeight,
                0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
 
  // Setup display on the web page
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement); 

  // Scene Creation and Manipulation 
  const geom = new THREE.BoxGeometry(3,3,3);

    let tex1, loaded, fname;
    fname = "textures/tex1.jpg"; loaded = false ;
    loader.load(
	   fname,
	   function(texture){ tex1 = texture; loaded = true; },
	   undefined,  // no progress monitoring
	   function ( err ) { console.error( 'An error happened.'); }
     );
   
   // We have to wait till above loads
   await sleep(1000) ;  // A very basic wait with no messages 
   if (loaded) console.log("Loaded " + fname) 
    else console.log("Failed to load " + fname + " in 1s") ;;

  const mat = new THREE.MeshPhongMaterial({
	                      color:     0x5f56f0,  
			  wireframe: false,
   	                        map: tex1
                          }); 
 
 
  const cube = new THREE.Mesh(geom, mat);
  
  camera.position.set(0,0,6);
  scene.add(cube);
	
  const light = new THREE.AmbientLight(0xd8f808); 
  scene.add(light);    

function animate(){
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  }

function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
  }
animate();
	
["x", "y", "z"].forEach(function(val){
                 document.getElementById(val).oninput = 
	                   function(){setColor(light)};
			   } );

function setColor(obj){
var str = "rgb(" + document.getElementById("x").value + ","
                 + document.getElementById("y").value + ","
                 + document.getElementById("z").value + ")"
obj.color.set(str) ;
}

document.getElementById("go").addEventListener(
	"click",
	function(){
		console.log("Hello");
		console.log(light.color.r, light.color.g, light.color.b);
	});
	
</script>

<body>
  <div class=container>
        Payload Thermal Model5
	<div class=form>
           <input type="range" class=form-range min=0 max=255 value=0 step=1 class="slider" id="x">
           <input type="range" class=form-range min=0 max=255 value=0 step=1 class="slider" id="y">
           <input type="range" class=form-range min=0 max=255 value=0 step=1  class="slider" id="z">
	    <button class=btn id="go">show</button>
		</div>
        <p id="msg"></p>

  </div>
</body>
</html>
