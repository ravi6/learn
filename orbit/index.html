<script type=module>
  import  {THREE, GUI, loader, scene, camera, renderer} from "./init.js" ;
  import {Cube} from "./cube.js" ;
  import {light, dlight, lightGUI} from  "./lights.js" ;
  import {Bishop} from "./chess.js" ;

  camera.position.set(0,0,6);
  let cube = Cube() ;
  scene.add(cube);
  scene.add(Bishop());
  scene.add(light); 
  scene.add(dlight);
//  lightGUI() ; // GUI for controlling lighting
  animate();
	
// Functions 
	
function animate(){
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  }

 function setColor (obj){
    let  dlg = document.createElement("dialog"); 
     dlg.classList.add("dlgFrame") ;
    let  hdr = document.createElement("h5"); 
     hdr.innerText = "Set Color" ;
     dlg.appendChild(hdr);
     
     // Create three sliders 
      ["r", "g", "b"].forEach(function(val){
          let div = document.createElement("div"); 
	  let input = document.createElement("input"); 
	    input.id = val ;
	    input.min = 0 ; input.max = 255 ; input.value = 0 ; input.step = 1 ;
	    input.class = "slider"; input.type = "range" ; 
  	    input.addEventListener("input", function(){
	          let rgb = "rgb(" + document.getElementById("r").value + ","
		     + document.getElementById("g").value + ","
		     + document.getElementById("b").value + ")" ;
	          console.log(rgb) ; obj.color.set(rgb);
	          document.getElementById("msg").innerText = rgb ;
	     }); // end evenlistener
	    div.appendChild(input);
            dlg.appendChild(div);
      });
	  let label = document.createElement("label"); 
	  label.id="msg"; label.innerText = "rgb(0,0,0)" ;
          dlg.appendChild(label);
	  document.body.appendChild(dlg);
 return(dlg);
}// setColor


 
document.getElementById("setLight").addEventListener(
       "click",function(){
        setColor(light).showModal();

	console.log(dlg);

	else {dlg.showModal()};
	*/
       });
</script>

</div>
