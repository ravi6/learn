<script type=module>
  import  {THREE, GUI, loader, scene, camera, renderer} from "./init.js" ;
  import {Cube} from "./cube.js" ;
  import {light, dlight, lightGUI} from  "./lights.js" ;
  import {Bishop} from "./chess.js" ;

  camera.position.set(0,0,6);
  let cube = Cube() ;
  scene.add(cube);
  scene.add(Bishop());
  scene.add(light); 
  scene.add(dlight);
//  lightGUI() ; // GUI for controlling lighting
  animate();
	
// Functions 
	
function animate(){
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  }

 function setColor (obj){
      // set Color of an object interactively
      let pop = window.open("", "Popup", "width=140, height=100");
     // Create three sliders 
      ["r", "g", "b"].forEach(function(val){
          let div = pop.document.createElement("div"); 
	  let input = pop.document.createElement("input"); 
	    input.id = val ;
	    input.min = 0 ; input.max = 255 ; input.value = 0 ; input.step = 1 ;
	    input.class = "slider"; input.type = "range" ; 
  	    input.addEventListener("input", function(){
	          let rgb = "rgb(" + pop.document.getElementById("r").value + ","
		     + pop.document.getElementById("g").value + ","
		     + pop.document.getElementById("b").value + ")" ;
	          console.log(rgb) ;
	          obj.color.set(rgb);
	          pop.document.getElementById("msg").innerText = rgb ;
	     }); // end evenlistener
	    div.appendChild(input);
            pop.document.body.appendChild(div);
	    pop.document.title="Set Color" ;
      });
          let div = pop.document.createElement("div");
	  let label = pop.document.createElement("label"); 
	  label.id="msg";
          label.innerText = "hello" ;
          div.appendChild(label);
          pop.document.body.appendChild(div) ;
	  //pop.addEventListener("beforeunload", function(){alert("DONE")});
}// setColor


 
document.getElementById("setLight").addEventListener(
       "click",function(){setColor(light);});
</script>

    <h2>Payload Thermal Model </h2>
   <button id="setLight">setLight</button>
  </div>
