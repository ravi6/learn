<script>

class pdfD {
  
  // Discrete variable pdf 
  
    constructor (n) { //n possible outcomes
      this.n = n ; 
      this.x = new Array(n);
      this.p = new Array(n);
      this.pc = new Array(n);
      this.count = new Array(n);
      
      // Default x, p values
      for (var i = 0 ; i < n ; i++) {
	     this.x[i] = i ;
	     this.p[i] = 1/n ; 
      }

      // Update Cumulative p's
      this.pc[0] = this.p[0] ;
      for (var i=1 ; i < n ; i++) 
	     this.pc[i] = this.pc[i-1] + this.p[i] ;

    } // end constructor


   update (d) { 
    // Update discrerte pdf from samples of x 
      this.count.fill(0) ;
    // bin the data
      for (var i = 0 ; i < d.length ; i++) {
	     for (var j = 0 ; i < this.n ; j++)
	       if (d[i] == this.x[j]) this.count[j]++  ; 
      }
       console.log(this.count);
    // update p values
        let tcount = this.count.reduce((a,b) => a+b, 0);
        for(var i = 0 ; i < this.n ; i++)
    	  this.p[i] = this.count[i] / tcount ;
  } // end update 

  E(pdf) {

    xm = 0 ;

        xm = xm + this.p[i] * this.x[i] ;
    return(xm);
  } // end E

 */
