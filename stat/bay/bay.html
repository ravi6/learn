 <body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

<script>
function test(N) { 
    var pdf = new pdfD(3) ;
    pdf.x = [1,2,3];
    pdf.p = [0.2,0.5,0.3] ; 
    var y = pdf.sample(N); 
    pdf.update(y); 
    console.log(pdf);
  } // end test

function ballGame(Ns) {

   // A discrete probability distribution
   // describing distrinution of a collection of three different
   // colored balls
   var a = 0.3 ; // fraction of color 0 balls
   var b = 0.5 ; //             color 1 balls
   var series = [] ; 

   var pdf = new pdfD(3);
   pdf.x=[0,1,2] ; // each value correspond to one color
   pdf.p=[a, b, 1-a-b];  

   // Let us draw some samples(Ns) from the above
   var y = pdf.sample(Ns) ;
   
   // I will pretent that I don't know the origin of this sample
   // And assume the proportion of balls are likely to be of this
   // distribution (starting prio)
   var Epdf = []; 
   for (let a = 0 ; a < 1 ; a = a + 0.1)  {
	for (let b = 0  ; b < 1-a ; b = b + 0.1) 
           Epdf.push( {a: a, b: b, prior: 0.1 post: 0.1});
      }
	         
    var xvals[Epdf.length].map(function(x,i){return(i);}) ;
    console.log(xvals) ;
    series.push({x: xvals
                 y: Epdf.prior
                       mode: 'lines',
                       name: sprintf("a=%d b=%d", a, b) });
                
   for (var m = 0 ; m < 10 ; m++) { // number of baesin estmates
     // Calculate posterior
      for (var k = 0 ; k < Epdf.length ; k++) {
	var lhood = 1 ; var x ;
	for (var i=0 ; i < Ns ; i++) {
		if (y[i] == 0) x = Epdf[k].a ;
		else if (y[i] == 1) x = Epdf[k].b ;
		else x = 1 - (Epdf[k].a + Epdf[k].b) ;
	     lhood = lhood * x ;
	  }
	    Epdf[k].post[k] = Epdf[k].prior[k] * lhood ; 
      }

      // Normalize posterior
      var total = 0 ;
      for(var i = 0 ; i < Epdf.length ; i++)
	 total = total + Epdf[i].post ;
      for(var i = 0 ; i < Epdf.length ; i++)
	  Epdf[i].post = Epdf[i].post / total  ;


  } // end data input

} // end ballGame
  var bpdf = new pdfBeta() ;
  bpdf.plot("fig", 2, 5) ;
  ballGame(100);
</script>
