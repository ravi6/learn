<script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"> </script>
<script src="https://cdn.plot.ly/plotly-2.4.2.min.js"></script>
<script type="text/javascript" src="pdfD.js"></script>
<script>

function test(N) { 
    var pdf = new pdfD(3) ;
    pdf.x = [1,2,3];
    pdf.p = [0.2,0.5,0.3] ; 
    var y = pdf.sample(N); 
    pdf.update(y); 
    console.log(pdf);
  } // end test

function flip(Ns) {
   // coin flip Baesian
   var pdf = new pdfD(2);
   pdf.x=[0,1] ;
   pdf.p=[0.5, 0.5];  // fair coin

   // Let us pick parameter p in range (0, 1)
   // assuming it has a beta distribution with alpha=1, beta=1
   var p ;
   jStat.beta.sample(p, 1, 1);

   // Let us draw some samples from from a coin flipping experiment
   var y = pdf.sample(Ns) ;
   
    // Calculate likelyhood of the above sample assuming probability of
   // head is p (we assume its distribution is of beta type)
   var lhood = 1 ;
   for (var i=0 ; i < Ns ; i++) {
	   if (y[i] == 1) x = p ; else x = 1 - p ;
	   lhood = lhood * x ;
	}
    var ph = jStat.beta.pdf(p, 1, 1) ; // probability of parameter being p
    var phd = lhood * ph ;
    console.log(p, lhood, ph, phd) ;
}

function betaPdf(a, b){
   data = {x: [], p: []};
   var n = 100 ;
   for (let i = 0 ; i < n ; i++) {
   	    let x = i / n ;
    	data.p.push(jStat.beta.pdf(x, a, b)) ;
    	data.x.push(x);
   }
   return(data);
} // end betaPDF
 

function plotme(){

     var a = [2, 10, 5] ;
     var b = [5, 10, 2] ;
     series = [] ;
   for (var i=0 ; i<3 ; i++) {
     var data = betaPdf(a[i], b[i]);	
     series.push( {x:    data.x,
                   y:    data.p,
                   mode: 'lines',
                   name: sprintf("a=%d b=%d", a[i], b[i])
                });
     }
                
     var layout = { title:      'Beta Distribution',               
                    showlegend: true,
               	    xaxis: {title: {text: "x"}},
	            yaxis: {title: {text: "pdf"}}
                  };
     Plotly.newPlot('fig', series, layout, 
                    {scrollZoom: false});     
  }
</script>

<body>
  <h1>Statistics Explorations</h1>
  <button onclick="plotme();">BetaPlot</button>
  <div id="fig"></div>


</body>
</html>
