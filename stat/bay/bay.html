 <body>

<script>
function test(N) { 
    var pdf = new pdfD(3) ;
    pdf.x = [1,2,3];
    pdf.p = [0.2,0.5,0.3] ; 
    var y = pdf.sample(N); 
    pdf.update(y); 
    console.log(pdf);
  } // end test

function ballGame(Ns) {

   // A discrete probability distribution
   // describing distrinution of a collection of three different
   // colored balls
   var a = 0.3 ; // fraction of color 0 balls
   var b = 0.5 ; //             color 1 balls
   
   var pdf = new pdfD(3);
   pdf.x=[0,1,2] ; // each value correspond to one color
   pdf.p=[a, b, 1-a-b];  

   // Let us draw some samples(Ns) from the above
   var y = pdf.sample(Ns) ;
   
   // I will pretent that I don't know the origin of this sample
   // And assume the proportion of balls are likely to be of this
   // distribution (starting prio)
   var prior = []; 
   for (let a = 0 ; a < 1 ; a = a + 0.1)  {
	for (let b = 0  ; b < 1-a ; b = b + 0.1) 
           prior.push( {a: a, b: b, p: 0.1});
      }
	         
   for (var m = 0 ; m < 10 ; m++) { // number of baesin estmates
   // Calculate posterior
    for (var k = 0 ; k < prior.length ; k++) {
      var lhood = 1 ; var x ;
      for (var i=0 ; i < Ns ; i++) {
	      if (y[i] == 0) x = prior[k].a ;
	      else if (y[i] == 1) x = prior[k].b ;
              else x = 1 - (prior[k].a + prior[k].b) ;
	   lhood = lhood * x ;
	}
           posterior.push({a: prior[k].a, 
	                   b: prior[k].b,
	                   p: prior[k].p * lhood});
    }

    // Normalize posterior
    var total = 0 ;
    for(var i = 0 ; i < posterior.length ; i++)
       total = total + posterior[i].p ;
    for(var i = 0 ; i < posterior.length ; i++)
        posterior[i].p = posterior[i].p / total  ;

    prior = posterior ; // ready for next cycle
  } // end data input

} // end ballGame
  var bpdf = new pdfBeta() ;
  bpdf.plot("fig", 2, 5) ;
  ballGame(100);
</script>
